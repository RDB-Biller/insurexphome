<!DOCTYPE html>
<html>
<head>
  <title>InsureXP</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-6 bg-gray-100">

<h1 class="text-3xl font-bold mb-6 text-blue-700">
  🏥 InsureXP Billing System
</h1>

<!-- FORM -->
<div class="bg-white p-4 rounded shadow-md max-w-lg">

  <input id="patient" placeholder="Patient Name"
    class="border p-2 mb-3 w-full rounded"/>

  <!-- SERVICES -->
  <input list="items" id="itemInput"
    placeholder="Select or type service / medication / item"
    class="border p-2 mb-3 w-full rounded"/>

  <datalist id="items">
    <option value="Consultation - 50">
    <option value="X-Ray - 120">
    <option value="Blood Test - 80">
    <option value="MRI Scan - 300">
    <option value="Medication - Paracetamol - 20">
    <option value="Medication - Antibiotics - 60">
    <option value="Surgery Fee - 500">
    <option value="Hospital Bed - 150">
  </datalist>

  <input id="amount" type="number" placeholder="Amount"
    class="border p-2 mb-3 w-full rounded"/>

  <!-- ✅ PAYMENT OPTIONS -->
  <select id="paymentType" class="border p-2 mb-3 w-full rounded">
    <option value="cash">Cash</option>
    <option value="insurance">Insurance</option>
    <option value="mtn_momo">MTN MoMo</option>
    <option value="bank_s">Bank S</option>
    <option value="bank_a">Bank A</option>
    <option value="bank_rb">Bank RB</option>
    <option value="other_momo">Other Mobile Money</option>
    <option value="visa_mastercard">Visa / Mastercard</option>
    <option value="other">Other</option>
  </select>

  <!-- DISCOUNT / SPLIT / CASHBACK -->
  <div class="flex gap-2 mb-3">
    <input id="discount" type="number" placeholder="Discount %"
      class="border p-2 w-1/3 rounded"/>
    <input id="split" type="number" placeholder="Insurance %"
      class="border p-2 w-1/3 rounded"/>
    <input id="cashback" type="number" placeholder="Cashback %"
      class="border p-2 w-1/3 rounded"/>
  </div>

  <button onclick="submitBill()"
    class="bg-blue-600 text-white px-4 py-2 rounded w-full">
    Submit Bill
  </button>

  <!-- FINAL PAYABLE -->
  <div id="finalDisplay"
    class="mt-4 text-lg font-bold text-green-700">
  </div>

</div>

<!-- OUTPUT -->
<div id="output"
  class="mt-6 p-4 bg-white rounded shadow text-sm whitespace-pre-wrap">
</div>

<!-- TABLE -->
<div class="mt-6 bg-white p-4 rounded shadow">
  <h2 class="font-bold mb-3">Billing History</h2>

  <table class="w-full border text-sm">
    <thead>
      <tr class="bg-gray-200">
        <th class="p-2">Patient</th>
        <th class="p-2">Item</th>
        <th class="p-2">Payment</th>
        <th class="p-2">Subtotal</th>
        <th class="p-2">Discount</th>
        <th class="p-2">Insurance</th>
        <th class="p-2">Cash</th>
        <th class="p-2">Cashback</th>
        <th class="p-2">Final</th>
        <th class="p-2">Status</th>
      </tr>
    </thead>
    <tbody id="billTable"></tbody>
  </table>
</div>

<script>
const API_URL = "https://insurexp-production.up.railway.app";
let bills = [];

// ✅ SET DEFAULT PAYMENT HERE
const DEFAULT_PAYMENT = "cash";

window.onload = () => {
  document.getElementById("paymentType").value = DEFAULT_PAYMENT;
};

// ✅ SMART BILLING
function applySmartBilling(subtotal, discountPct, splitPct, cashbackPct, paymentType) {

  const discount = (discountPct / 100) * subtotal;
  const afterDiscount = subtotal - discount;

  let insuranceCover = 0;
  let cashPay = 0;

  const isInsurance = paymentType === "insurance";

  if (isInsurance) {
    insuranceCover = (splitPct / 100) * afterDiscount;
    cashPay = afterDiscount - insuranceCover;
  } else {
    cashPay = afterDiscount;
  }

  const cashback = (cashbackPct / 100) * cashPay;
  const finalPayable = cashPay - cashback;

  return {
    discount,
    insuranceCover,
    cashPay,
    cashback,
    finalPayable
  };
}

// AUTO-FILL PRICE
document.getElementById("itemInput").addEventListener("change", function() {
  const value = this.value;
  const priceMatch = value.match(/- (\d+)/);
  if (priceMatch) {
    document.getElementById("amount").value = priceMatch[1];
  }
});

// CREATE BILL
async function submitBill() {

  const patient = document.getElementById("patient").value;
  const item = document.getElementById("itemInput").value;
  const amount = Number(document.getElementById("amount").value);
  const discountPct = Number(document.getElementById("discount").value) || 0;
  const splitPct = Number(document.getElementById("split").value) || 0;
  const cashbackPct = Number(document.getElementById("cashback").value) || 0;
  const paymentType = document.getElementById("paymentType").value;

  if (!patient || !amount) {
    document.getElementById("output").innerText =
      "❌ Please enter patient name and amount";
    return;
  }

  const result = applySmartBilling(
    amount,
    discountPct,
    splitPct,
    cashbackPct,
    paymentType
  );

  document.getElementById("finalDisplay").innerText =
    "💰 Final Payable: " + result.finalPayable.toFixed(2);

  try {
    const res = await fetch(API_URL + "/billing", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        patientName: patient,
        subtotal: amount,
        paymentType
      })
    });

    const data = await res.json();

    const bill = {
      id: data.bill?.id || Date.now(),
      patientName: patient,
      item,
      paymentType,
      subtotal: amount,
      ...result,
      status: "PENDING"
    };

    bills.unshift(bill);
    renderTable();

    document.getElementById("output").innerText =
      "✅ Bill Created Successfully";

  } catch (err) {
    document.getElementById("output").innerText =
      "❌ ERROR: " + err.message;
  }
}

// TABLE
function renderTable() {
  const table = document.getElementById("billTable");
  table.innerHTML = "";

  bills.forEach(bill => {
    table.innerHTML += `
      <tr class="border-t text-center">
        <td class="p-2">${bill.patientName}</td>
        <td class="p-2">${bill.item}</td>
        <td class="p-2">${bill.paymentType}</td>
        <td class="p-2">${bill.subtotal}</td>
        <td class="p-2">${bill.discount.toFixed(2)}</td>
        <td class="p-2">${bill.insuranceCover.toFixed(2)}</td>
        <td class="p-2">${bill.cashPay.toFixed(2)}</td>
        <td class="p-2">${bill.cashback.toFixed(2)}</td>
        <td class="p-2 font-bold">${bill.finalPayable.toFixed(2)}</td>
        <td class="p-2">${bill.status}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
