<!DOCTYPE html>
<html>
<head>
  <title>InsureXP</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-gray-100">

  <h1 class="text-2xl font-bold mb-4">InsureXP Billing</h1>

  <input id="patient" placeholder="Patient Name" class="border p-2 mb-2 w-full"/>
  <input id="amount" type="number" placeholder="Amount" class="border p-2 mb-2 w-full"/>

  <button onclick="submitBill()" class="bg-blue-600 text-white px-4 py-2 rounded">
    Submit Bill
  </button>

  <div id="output" class="mt-4"></div>

  <script>
    const API_URL = "https://insurexp-production.up.railway.app";

    async function submitBill() {
  try {
    const patient = document.getElementById("patient").value;
    const amount = document.getElementById("amount").value;

    const res = await fetch("https://insurexp-production.up.railway.app/billing", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        patientName: patient,
        subtotal: Number(amount)
      })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "ERROR: " + err.message;
  }
}

    const data = await res.json();

    document.getElementById("output").innerText =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "ERROR: " + err.message;
  }
}

      const data = await res.json();
      document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
